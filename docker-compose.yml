version: '3.8'

services:
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: valkey_demo
    ports:
      - "6379:6379"
    volumes:
      - valkey_local_data:/data
    environment:
      - VALKEY_PASSWORD=local_demo_password
    command: sh -c "valkey-server --appendonly yes --requirepass $$$$VALKEY_PASSWORD"

volumes:
  valkey_local_data:
